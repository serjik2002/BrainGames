<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кубик Рубіка 3D - Brain Games</title>
    
    <!-- Підключення шрифту -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- Підключення Three.js для 3D графіки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Підключення canvas-confetti для салюту -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* CSS Змінні для світлої та темної теми */
        :root {
            /* Базові кольори фону та тексту */
            --bg-color: #f4f7fb;
            --text-main: #1C2331;
            --text-sub: #7A8294;
            --board-bg: #ffffff;
            --board-shadow: rgba(0, 0, 0, 0.05);
            --modal-bg: rgba(255, 255, 255, 0.95);
            
            /* Елементи UI */
            --btn-bg: #ffffff;
            --btn-shadow: rgba(0, 0, 0, 0.08);
            --btn-green: #56C596;
            --btn-green-shadow: #3e9a74;
            
            /* Пастельні кольори для кубика (світла тема) */
            --cube-white: #ffffff;
            --cube-yellow: #ffec99;
            --cube-red: #ff8787;
            --cube-orange: #ffc078;
            --cube-green: #69db7c;
            --cube-blue: #74c0fc;
            --cube-inner: #1a1a1a;
        }

        [data-theme="dark"] {
            /* Темна тема */
            --bg-color: #121826;
            --text-main: #f0f2f5;
            --text-sub: #a0a8b8;
            --board-bg: #1e293b;
            --board-shadow: rgba(0, 0, 0, 0.3);
            --modal-bg: rgba(30, 41, 59, 0.95);
            
            --btn-bg: #2d3748;
            --btn-shadow: rgba(0, 0, 0, 0.2);
            --btn-green: #48a57e;
            --btn-green-shadow: #2d6b50;

            /* Приглушені кольори кубика для темної теми */
            --cube-white: #e2e8f0;
            --cube-yellow: #d8c67c;
            --cube-red: #d96c6c;
            --cube-orange: #d69e63;
            --cube-green: #54b264;
            --cube-blue: #5b9ccf;
            --cube-inner: #0f172a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Заборона виділення тексту */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh; /* Жорстка висота з підтримкою динамічних екранів */
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow: hidden; /* Тотальна заборона скролу сторінки */
        }

        /* Універсальний контейнер - єдиний регулятор ширини */
        .app-container {
            width: 100%;
            /* Ширина обчислюється так, щоб висота завжди ідеально вписувалась в екран */
            max-width: min(500px, calc(100dvh - 240px)); 
            margin: 0 auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Верхня панель (Тема + Очки) */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 44px;
            width: 100%;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--btn-bg);
            border: none;
            box-shadow: 0 4px 10px var(--btn-shadow);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s;
        }
        .icon-btn:active { transform: scale(0.95); }
        .icon-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-main);
            transition: fill 0.3s;
        }

        .score-pill {
            background: var(--btn-bg);
            padding: 8px 16px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px var(--btn-shadow);
            font-weight: 700;
            font-size: 18px;
            transition: background-color 0.3s;
        }
        .score-pill svg {
            width: 20px;
            height: 20px;
            fill: #ffd43b; /* Жовта зірочка */
        }

        /* Заголовок */
        .header {
            text-align: left;
            margin-bottom: 0px;
            width: 100%;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .header p {
            font-size: 14px;
            color: var(--text-sub);
        }

        /* Ігрове поле */
        .board-bg {
            background: var(--board-bg);
            border-radius: 24px;
            padding: 6px;
            box-shadow: 0 10px 30px var(--board-shadow);
            transition: background-color 0.3s, box-shadow 0.3s;
            width: 100%;
        }

        .board {
            width: 100%;
            aspect-ratio: 1; /* Робить поле ідеальним квадратом */
            position: relative;
            border-radius: 18px;
            overflow: hidden;
            background: radial-gradient(circle, var(--btn-shadow) 0%, transparent 70%);
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            outline: none;
        }

        /* Панель керування */
        .controls {
            display: flex;
            justify-content: center;
            margin-top: 5px;
            width: 100%;
        }

        .scramble-btn {
            background-color: var(--btn-green);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--btn-green-shadow);
            transition: transform 0.1s, box-shadow 0.1s, background-color 0.3s;
            width: 100%;
        }
        .scramble-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--btn-green-shadow);
        }

        /* Модальне вікно перемоги */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal {
            background: var(--modal-bg);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            transform: translateY(20px) scale(0.95);
            transition: transform 0.3s;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 350px;
        }
        .overlay.active .modal {
            transform: translateY(0) scale(1);
        }
        .modal h2 {
            font-size: 28px;
            margin-bottom: 10px;
            color: var(--text-main);
        }
        .modal p {
            color: var(--text-sub);
            margin-bottom: 25px;
            font-size: 16px;
        }
        .modal-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: #fff3cd;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-icon svg { width: 40px; height: 40px; fill: #ffd43b; }

    </style>
</head>
<body>

<div class="app-container">
    <!-- Верхня панель -->
    <div class="top-bar">
        <button class="icon-btn" id="themeBtn" aria-label="Змінити тему">
            <svg id="themeIcon" viewBox="0 0 24 24">
                <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06z"></path>
            </svg>
        </button>

        <div class="score-pill">
            <svg viewBox="0 0 24 24">
                <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path>
            </svg>
            <span id="scoreDisplay">0</span>
        </div>
    </div>

    <!-- Заголовок -->
    <div class="header">
        <h1>Рубік</h1>
        <p>Свайпай по кубику щоб крутити ряди</p>
    </div>

    <!-- Ігрове поле -->
    <div class="board-bg">
        <div class="board" id="board"></div>
    </div>

    <!-- Кнопка керування -->
    <div class="controls">
        <button class="scramble-btn" id="scrambleBtn">Заплутати</button>
    </div>
</div>

<!-- Модальне вікно -->
<div class="overlay" id="winOverlay">
    <div class="modal">
        <div class="modal-icon">
            <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path></svg>
        </div>
        <h2>Блискуче!</h2>
        <p>Ти успішно зібрав кубик.</p>
        <button class="scramble-btn" id="playAgainBtn">Грати ще</button>
    </div>
</div>

<script>
    let materials = [];

    // ==========================================
    // 1. АУДІО ДВИЖОК
    // ==========================================
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        
        if (type === 'click') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
            gainNode.gain.setValueAtTime(0.5, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'win') {
            osc.type = 'sine';
            const notes = [440, 554.37, 659.25, 880];
            gainNode.gain.setValueAtTime(0.2, now);
            notes.forEach((freq, i) => {
                const oscNote = audioCtx.createOscillator();
                const gainNote = audioCtx.createGain();
                oscNote.type = 'sine';
                oscNote.frequency.value = freq;
                oscNote.connect(gainNote);
                gainNote.connect(audioCtx.destination);
                gainNote.gain.setValueAtTime(0, now);
                gainNote.gain.linearRampToValueAtTime(0.3, now + i * 0.1 + 0.05);
                gainNote.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.5);
                oscNote.start(now + i * 0.1);
                oscNote.stop(now + i * 0.1 + 0.5);
            });
        }
    }

    document.addEventListener('pointerdown', initAudio, { once: true });

    // ==========================================
    // 2. СИСТЕМА ТЕМ
    // ==========================================
    const themeBtn = document.getElementById('themeBtn');
    const themeIcon = document.getElementById('themeIcon');
    const htmlEl = document.documentElement;

    const sunPath = "M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06z";
    const moonPath = "M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4C12.92 3.04 12.46 3 12 3zm0 16c-3.86 0-7-3.14-7-7s3.14-7 7-7c.18 0 .35.02.51.05-.62.88-1.01 1.96-1.01 3.12 0 3.16 2.45 5.7 5.56 5.89C15.7 17.65 13.96 19 12 19z";

    function setTheme(theme) {
        htmlEl.setAttribute('data-theme', theme);
        localStorage.setItem('brain_games_theme', theme);
        themeIcon.innerHTML = `<path d="${theme === 'dark' ? moonPath : sunPath}"></path>`;
        updateCubeColors();
    }

    themeBtn.addEventListener('click', () => {
        const currentTheme = htmlEl.getAttribute('data-theme');
        setTheme(currentTheme === 'light' ? 'dark' : 'light');
        playSound('click');
    });

    const savedTheme = localStorage.getItem('brain_games_theme') || 'light';
    setTheme(savedTheme);

    // ==========================================
    // 3. THREE.JS: ЛОГІКА КУБИКА РУБІКА
    // ==========================================
    const board = document.getElementById('board');
    let scene, camera, renderer;
    let cubeGroup;
    const cubies = [];
    
    const getColors = () => {
        const style = getComputedStyle(document.body);
        return [
            style.getPropertyValue('--cube-red').trim(),
            style.getPropertyValue('--cube-orange').trim(),
            style.getPropertyValue('--cube-white').trim(),
            style.getPropertyValue('--cube-yellow').trim(),
            style.getPropertyValue('--cube-green').trim(),
            style.getPropertyValue('--cube-blue').trim(),
            style.getPropertyValue('--cube-inner').trim()
        ];
    };

    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, board.clientWidth / board.clientHeight, 0.1, 100);
        camera.position.set(5, 5, 6);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(board.clientWidth, board.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        board.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.3);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        cubeGroup = new THREE.Group();
        scene.add(cubeGroup);

        createCubies();

        window.addEventListener('resize', () => {
            if(board.clientWidth === 0) return;
            camera.aspect = board.clientWidth / board.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(board.clientWidth, board.clientHeight);
        });

        renderer.setAnimationLoop(() => {
            renderer.render(scene, camera);
        });

        setupControls();
    }

    function createMaterials() {
        const colors = getColors();
        materials = [];
        for (let i = 0; i < 6; i++) {
            materials.push(new THREE.MeshLambertMaterial({ 
                color: colors[i], polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1 
            }));
        }
        const innerMat = new THREE.MeshLambertMaterial({ color: colors[6] });
        return { colored: materials, inner: innerMat };
    }

    function createCubies() {
        cubies.forEach(c => cubeGroup.remove(c));
        cubies.length = 0;

        const mats = createMaterials();
        const gap = 0.05; 
        const size = 0.95;
        const geometry = new THREE.BoxGeometry(size, size, size);
        const edgesGeo = new THREE.EdgesGeometry(geometry);
        const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2, transparent: true, opacity: 0.2 });

        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                for (let z = -1; z <= 1; z++) {
                    const cubeMaterials = [
                        x === 1 ? mats.colored[0] : mats.inner,
                        x === -1 ? mats.colored[1] : mats.inner,
                        y === 1 ? mats.colored[2] : mats.inner,
                        y === -1 ? mats.colored[3] : mats.inner,
                        z === 1 ? mats.colored[4] : mats.inner,
                        z === -1 ? mats.colored[5] : mats.inner,
                    ];
                    const mesh = new THREE.Mesh(geometry, cubeMaterials);
                    mesh.position.set(x * (1 + gap), y * (1 + gap), z * (1 + gap));
                    
                    const edges = new THREE.LineSegments(edgesGeo, edgeMat);
                    mesh.add(edges);
                    mesh.userData = { x, y, z };
                    
                    cubeGroup.add(mesh);
                    cubies.push(mesh);
                }
            }
        }
        // Красивий початковий ракурс
        cubeGroup.quaternion.setFromEuler(new THREE.Euler(0.2, -0.4, 0));
    }

    function updateCubeColors() {
        if (!materials || materials.length === 0) return;
        const colors = getColors();
        for (let i = 0; i < 6; i++) {
            materials[i].color.set(colors[i]);
        }
    }

    // ==========================================
    // 4. ІНТЕРАКЦІЯ ТА СВАЙПИ (ВЕКТОРНА МАТЕМАТИКА)
    // ==========================================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    
    let isDragging = false;
    let dragStartPoint = { x: 0, y: 0 };
    let intersectStart = null;
    let isAnimating = false;
    let isGameActive = false;
    let score = 0;

    function setupControls() {
        board.addEventListener('pointerdown', onPointerDown);
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', onPointerUp);
        window.addEventListener('pointercancel', onPointerUp);
    }

    function getIntersects(event) {
        const rect = board.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        return raycaster.intersectObjects(cubies);
    }

    function onPointerDown(event) {
        if (isAnimating) return;
        isDragging = true;
        dragStartPoint = { x: event.clientX, y: event.clientY };
        
        const intersects = getIntersects(event);
        if (intersects.length > 0) {
            intersectStart = intersects[0];
        } else {
            intersectStart = null;
        }
    }

    function onPointerMove(event) {
        if (!isDragging || isAnimating) return;

        const deltaX = event.clientX - dragStartPoint.x;
        const deltaY = event.clientY - dragStartPoint.y;

        if (!intersectStart) {
            // Отримуємо вектори напрямку "Вгору" та "Вправо" відносно камери
            const rightDir = new THREE.Vector3(1, 0, 0).transformDirection(camera.matrixWorld).normalize();
            const upDir = new THREE.Vector3(0, 1, 0).transformDirection(camera.matrixWorld).normalize();

            // Обертаємо навколо осі "Вгору" для руху по X, і навколо "Вправо" для руху по Y
            const rotX = new THREE.Quaternion().setFromAxisAngle(upDir, deltaX * 0.005);
            const rotY = new THREE.Quaternion().setFromAxisAngle(rightDir, deltaY * 0.005);

            // Комбінуємо та застосовуємо обертання у глобальному просторі (відносно екрану)
            const deltaRot = new THREE.Quaternion().multiplyQuaternions(rotY, rotX);
            cubeGroup.quaternion.premultiply(deltaRot);
            cubeGroup.quaternion.normalize(); // Уникаємо накопичення похибок

            dragStartPoint = { x: event.clientX, y: event.clientY };
        } else {
            // Свайп по фігурі (відстежуємо напрямок)
            const dist = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
            if (dist > 30) {
                handleSliceRotation(deltaX, deltaY);
                isDragging = false;
            }
        }
    }

    function onPointerUp() {
        isDragging = false;
        intersectStart = null;
    }

    // Найбільш надійний метод визначення осі через Векторний добуток
    function handleSliceRotation(deltaX, deltaY) {
        // 1. Нормаль грані (куди вона дивиться у світовому просторі)
        const normalWorld = intersectStart.face.normal.clone().transformDirection(intersectStart.object.matrixWorld).normalize();
        
        // 2. Вектор свайпу мишкою у світовому просторі камери
        const dragWorld = new THREE.Vector3(deltaX, -deltaY, 0);
        dragWorld.transformDirection(camera.matrixWorld).normalize();
        
        // 3. Ось обертання = Нормаль Х Вектор руху (Векторний добуток)
        const axisWorld = new THREE.Vector3().crossVectors(normalWorld, dragWorld).normalize();
        
        // 4. Переводимо світову вісь у локальну систему координат кубика
        const matrixInverse = cubeGroup.matrixWorld.clone().invert();
        const axisLocal = axisWorld.clone().transformDirection(matrixInverse).round();
        
        let axis = new THREE.Vector3();
        let direction = 1;
        
        // Визначаємо найсильнішу домінантну вісь
        if (Math.abs(axisLocal.x) > Math.abs(axisLocal.y) && Math.abs(axisLocal.x) > Math.abs(axisLocal.z)) {
            axis.set(1, 0, 0); direction = Math.sign(axisLocal.x);
        } else if (Math.abs(axisLocal.y) > Math.abs(axisLocal.z)) {
            axis.set(0, 1, 0); direction = Math.sign(axisLocal.y);
        } else {
            axis.set(0, 0, 1); direction = Math.sign(axisLocal.z);
        }

        const point = intersectStart.object.position.clone();
        rotateLayer(axis, point, direction * Math.PI / 2, 300);
    }

    // Обертання шару
    function rotateLayer(axis, point, angle, duration = 300, isScrambling = false) {
        return new Promise(resolve => {
            isAnimating = true;
            if (!isScrambling) playSound('click');

            const activeCubies = [];
            const epsilon = 0.5;

            // Відбір кубиків, що належать до площини зрізу
            cubies.forEach(c => {
                if (axis.x && Math.abs(c.position.x - point.x) < epsilon) activeCubies.push(c);
                if (axis.y && Math.abs(c.position.y - point.y) < epsilon) activeCubies.push(c);
                if (axis.z && Math.abs(c.position.z - point.z) < epsilon) activeCubies.push(c);
            });

            const pivot = new THREE.Object3D();
            pivot.rotation.set(0, 0, 0);
            pivot.updateMatrixWorld();
            cubeGroup.add(pivot);

            activeCubies.forEach(c => pivot.attach(c));

            const startRot = pivot.rotation[axis.x ? 'x' : axis.y ? 'y' : 'z'];
            const targetRot = startRot + angle;
            const startTime = performance.now();

            function animateRotation(now) {
                const timePassed = now - startTime;
                const progress = Math.min(timePassed / duration, 1);
                
                // Згладжування Quad in/out
                const ease = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
                pivot.rotation[axis.x ? 'x' : axis.y ? 'y' : 'z'] = startRot + (targetRot - startRot) * ease;
                
                if (progress < 1) {
                    requestAnimationFrame(animateRotation);
                } else {
                    pivot.updateMatrixWorld();
                    
                    // Жорстка фіксація позиції щоб уникнути "випадіння" кубиків при скрамблуванні
                    const snapPos = (val) => {
                        if (val > 0.5) return 1.05;
                        if (val < -0.5) return -1.05;
                        return 0;
                    };

                    activeCubies.forEach(c => {
                        c.updateMatrixWorld();
                        cubeGroup.attach(c);
                        
                        // Фіксація світових координат на ідеальній сітці
                        c.position.x = snapPos(c.position.x);
                        c.position.y = snapPos(c.position.y);
                        c.position.z = snapPos(c.position.z);
                        
                        // Ідеальне математичне округлення матриці ротації (лише рівні 90 градусів)
                        const mat = new THREE.Matrix4().makeRotationFromQuaternion(c.quaternion);
                        const e = mat.elements;
                        for(let i = 0; i < 16; i++) e[i] = Math.round(e[i]);
                        c.quaternion.setFromRotationMatrix(mat);
                    });
                    
                    cubeGroup.remove(pivot);
                    isAnimating = false;
                    
                    if (!isScrambling && isGameActive) checkWinCondition();
                    resolve(); // Завершення Promise
                }
            }
            requestAnimationFrame(animateRotation);
        });
    }

    // Заплутування кубика
    async function scramble() {
        if(isAnimating) return;
        isGameActive = false;
        isAnimating = true; // Блокуємо UI
        
        const axes = [new THREE.Vector3(1,0,0), new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,1)];
        const points = [-1.05, 0, 1.05];
        
        for(let i = 0; i < 20; i++) {
            const axis = axes[Math.floor(Math.random() * axes.length)];
            const pt = new THREE.Vector3();
            const coord = points[Math.floor(Math.random() * points.length)];
            if(axis.x) pt.x = coord;
            if(axis.y) pt.y = coord;
            if(axis.z) pt.z = coord;
            
            const dir = Math.random() > 0.5 ? 1 : -1;
            
            await rotateLayer(axis, pt, dir * Math.PI/2, 80, true);
        }
        isGameActive = true;
    }

    // ==========================================
    // 5. РОЗУМНА ПЕРЕВІРКА ПЕРЕМОГИ
    // ==========================================
    function checkWinCondition() {
        let isSolved = true;
        
        // Беремо тільки зовнішні кубики (8 кутів + 12 ребер = 20 шт).
        // Ігноруємо центри та серцевину, оскільки вони можуть бути математично прокручені
        // на місці, що візуально ніяк не впливає на складений кубик.
        const outerCubies = cubies.filter(c => 
            (Math.abs(c.userData.x) + Math.abs(c.userData.y) + Math.abs(c.userData.z)) >= 2
        );

        if (outerCubies.length === 0) return;

        // Беремо поточний поворот (орієнтацію) ПЕРШОГО зовнішнього кубика як еталон
        const refMat = new THREE.Matrix4().makeRotationFromQuaternion(outerCubies[0].quaternion);
        const refE = refMat.elements;

        // Перевіряємо всі інші кутові та реберні деталі
        // Якщо кубик складено правильно, всі його деталі матимуть ОДНАКОВЕ обертання відносно початку гри.
        // Завдяки цьому кубик може бути зібраний хоч догори дригом, і гра все одно це зарахує!
        for (let i = 1; i < outerCubies.length; i++) {
            const mat = new THREE.Matrix4().makeRotationFromQuaternion(outerCubies[i].quaternion);
            const e = mat.elements;
            
            for (let j = 0; j < 16; j++) {
                // Допускаємо мінімальну похибку обчислень у дробових числах
                if (Math.abs(refE[j] - e[j]) > 0.1) {
                    isSolved = false;
                    break;
                }
            }
            if (!isSolved) break;
        }

        if (isSolved && isGameActive) {
            handleWin();
        }
    }

    function handleWin() {
        isGameActive = false;
        playSound('win');
        
        score += 150;
        document.getElementById('scoreDisplay').innerText = score;

        // Салют конфеті
        var duration = 3000;
        var end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 5, angle: 60, spread: 55, origin: { x: 0 },
                colors: ['#ff8787', '#69db7c', '#74c0fc', '#ffec99']
            });
            confetti({
                particleCount: 5, angle: 120, spread: 55, origin: { x: 1 },
                colors: ['#ff8787', '#69db7c', '#74c0fc', '#ffec99']
            });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());

        // Показ модального вікна з перемогою
        setTimeout(() => document.getElementById('winOverlay').classList.add('active'), 1000);
    }

    // ==========================================
    // 6. ІНІЦІАЛІЗАЦІЯ
    // ==========================================
    document.getElementById('scrambleBtn').addEventListener('click', scramble);
    document.getElementById('playAgainBtn').addEventListener('click', () => {
        document.getElementById('winOverlay').classList.remove('active');
        cubies.forEach(c => {
            c.position.set(c.userData.x * 1.05, c.userData.y * 1.05, c.userData.z * 1.05);
            c.quaternion.set(0,0,0,1);
        });
        cubeGroup.quaternion.setFromEuler(new THREE.Euler(0.2, -0.4, 0));
        scramble();
    });

    window.onload = init3D;

</script>
