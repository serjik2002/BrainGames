<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Фіджет-спінер - Brain Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Базові змінні кольорів та розмірів (Brain Games Standard) */
        :root {
            --bg-color: #F8F9FA;
            --text-color: #1C2331;
            --text-muted: #7A8294;
            --board-bg: #FFFFFF;
            --shadow-color: rgba(0, 0, 0, 0.08);
            
            --color-yellow: #FFD166;
            --color-green: #06D6A0;
            --color-blue: #118AB2;
            --color-pink: #EF476F;
            --color-purple: #D7D0F1;
            
            --btn-bg: #FFFFFF;
            --btn-shadow: rgba(0, 0, 0, 0.1);
            --icon-color: rgba(0, 0, 0, 0.15);

            /* Металеві відтінки для підшипника */
            --bearing-1: #ffffff;
            --bearing-2: #cfd4dc;
            --bearing-3: #9aa1ad;
            --bearing-4: #5b616c;
            --cap-1: #3a3d44;
            --cap-2: #16171b;
        }

        [data-theme="dark"] {
            --bg-color: #121826;
            --text-color: #E2E8F0;
            --text-muted: #94A3B8;
            --board-bg: #1E293B;
            --shadow-color: rgba(0, 0, 0, 0.3);
            
            --color-yellow: #D9B35A;
            --color-green: #05A87E;
            --color-blue: #0E6B8A;
            --color-pink: #BF3959;
            --color-purple: #B2ABC9;

            --btn-bg: #2B3548;
            --btn-shadow: rgba(0, 0, 0, 0.4);
            --icon-color: rgba(255, 255, 255, 0.15);

            --bearing-1: #9aa1ad;
            --bearing-2: #6b707a;
            --bearing-3: #4a4e57;
            --bearing-4: #2a2c32;
            --cap-1: #1a1b1f;
            --cap-2: #050506;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            overflow: hidden;
            touch-action: none;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Ідеальне вписування: 220px компенсує висоту заголовків та кнопок */
        .app-container {
            width: 100%;
            max-width: min(100%, calc(100dvh - 220px));
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Верхня панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .theme-toggle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--btn-bg);
            border: none;
            box-shadow: 0 4px 0 var(--btn-shadow);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            color: var(--text-color);
        }

        .theme-toggle:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--btn-shadow);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .score-container {
            background-color: var(--btn-bg);
            padding: 10px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 0 var(--btn-shadow);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .score-container svg {
            width: 24px;
            height: 24px;
            fill: var(--color-yellow);
        }

        /* Заголовок */
        .header {
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .header p {
            margin: 5px 0 0 0;
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 700;
        }

        /* Ігрове поле */
        .board-bg {
            background-color: var(--board-bg);
            border-radius: 30px;
            padding: 10px;
            box-shadow: 0 10px 30px var(--shadow-color);
            width: 100%;
            aspect-ratio: 1;
            position: relative;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .board {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            touch-action: none;
        }

        [data-theme="dark"] .board {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Спінер */
        .spinner-stage {
            width: 85%;
            height: 85%;
            cursor: grab;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.15));
        }
        
        .spinner-stage.grabbing {
            cursor: grabbing;
        }

        #spinnerArms {
            will-change: transform;
        }

        .hint-text {
            position: absolute;
            bottom: 15px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 700;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        /* Нижня панель статистики */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        .stat-pill {
            background-color: var(--btn-bg);
            padding: 12px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 0 var(--btn-shadow);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 16px;
            color: var(--text-color);
            transition: all 0.2s ease;
        }

        .stat-pill svg {
            width: 20px;
            height: 20px;
        }

        /* Модальне вікно */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: var(--board-bg);
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 40px var(--shadow-color);
            transform: translateY(20px);
            transition: transform 0.3s ease;
            width: 90%;
            max-width: 340px;
            color: var(--text-color);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-content h2 {
            font-size: 28px;
            margin: 0 0 10px 0;
            color: var(--color-green);
            font-weight: 800;
        }

        .modal-content p {
            color: var(--text-muted);
            margin: 0 0 25px 0;
            font-size: 16px;
            font-weight: 700;
        }

        .modal-btn {
            background-color: var(--color-green);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.15);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .modal-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 rgba(0, 0, 0, 0.15);
        }

        .sun-icon { display: block; }
        .moon-icon { display: none; }
        [data-theme="dark"] .sun-icon { display: none; }
        [data-theme="dark"] .moon-icon { display: block; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Верхня панель -->
        <div class="top-bar">
            <button class="theme-toggle" id="themeBtn" aria-label="Змінити тему">
                <svg class="sun-icon" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06z"/></svg>
                <svg class="moon-icon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
            </button>
            <div class="score-container" title="Рекорд часу">
                <svg viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                <span id="recordVal">—</span>
            </div>
        </div>

        <!-- Заголовок -->
        <div class="header">
            <h1>Фіджет-спінер</h1>
            <p>Покрути та тримай якомога довше!</p>
        </div>

        <!-- Ігрове поле -->
        <div class="board-bg">
            <div class="board" id="spinnerBoard">
                <svg class="spinner-stage" id="spinnerStage" viewBox="0 0 200 200">
                    <defs>
                        <!-- Градієнти перенесені з оригінального коду -->
                        <linearGradient id="bodyGrad" gradientUnits="userSpaceOnUse" x1="140" y1="20" x2="60" y2="180">
                            <stop offset="0%" stop-color="#FF3FC2"/>
                            <stop offset="22%" stop-color="#C24CE0"/>
                            <stop offset="50%" stop-color="#3D8FF5"/>
                            <stop offset="65%" stop-color="#2FC6D8"/>
                            <stop offset="80%" stop-color="#6BD65C"/>
                            <stop offset="100%" stop-color="#D9E84A"/>
                        </linearGradient>
                        <radialGradient id="ballShine" cx="35%" cy="30%" r="65%">
                            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
                            <stop offset="45%" stop-color="#ffffff" stop-opacity="0.25"/>
                            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
                        </radialGradient>
                        <radialGradient id="bearingGrad" cx="35%" cy="30%" r="75%">
                            <stop offset="0%" stop-color="#F2F3F5"/>
                            <stop offset="50%" stop-color="#C9CCD2"/>
                            <stop offset="100%" stop-color="#8E929B"/>
                        </radialGradient>
                        <radialGradient id="capGrad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#2B2C30"/>
                            <stop offset="100%" stop-color="#040405"/>
                        </radialGradient>
                    </defs>

                    <!-- Статична контактна тінь -->
                    <ellipse cx="100" cy="185" rx="55" ry="8" fill="rgba(0,0,0,0.15)"/>

                    <g id="spinnerArms">
                        <circle cx="100" cy="42" r="40" fill="url(#bodyGrad)"/>
                        <circle cx="150" cy="129" r="40" fill="url(#bodyGrad)"/>
                        <circle cx="50" cy="129" r="40" fill="url(#bodyGrad)"/>
                        <circle cx="100" cy="100" r="42" fill="url(#bodyGrad)"/>

                        <g transform="rotate(0 100 100)">
                            <circle cx="100" cy="42" r="22" fill="url(#bearingGrad)"/>
                            <circle cx="100" cy="42" r="18" fill="url(#capGrad)"/>
                            <circle cx="100" cy="42" r="18" fill="url(#ballShine)"/>
                        </g>
                        <g transform="rotate(120 100 100)">
                            <circle cx="100" cy="42" r="22" fill="url(#bearingGrad)"/>
                            <circle cx="100" cy="42" r="18" fill="url(#capGrad)"/>
                            <circle cx="100" cy="42" r="18" fill="url(#ballShine)"/>
                        </g>
                        <g transform="rotate(240 100 100)">
                            <circle cx="100" cy="42" r="22" fill="url(#bearingGrad)"/>
                            <circle cx="100" cy="42" r="18" fill="url(#capGrad)"/>
                            <circle cx="100" cy="42" r="18" fill="url(#ballShine)"/>
                        </g>

                        <!-- Центральний ковпачок -->
                        <circle cx="100" cy="100" r="25" fill="url(#bearingGrad)"/>
                        <circle cx="100" cy="100" r="20" fill="url(#capGrad)"/>
                        <circle cx="100" cy="100" r="20" fill="url(#ballShine)"/>
                    </g>
                </svg>
                <div class="hint-text" id="hintText">Покрути пальцем і відпусти 👆</div>
            </div>
        </div>

        <!-- Статистика -->
        <div class="stats-row">
            <div class="stat-pill" style="color: var(--text-muted);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2"/><path d="M9 2h6M12 2v3" stroke-linecap="round"/></svg>
                <span id="timeVal" style="color: var(--text-color);">0.0</span> с
            </div>
            <div class="stat-pill" style="color: var(--color-green);">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h7l-1 8 11-13h-7l1-7z"/></svg>
                <span id="rpmVal" style="color: var(--text-color);">0</span> об/хв
            </div>
        </div>

    </div>

    <!-- Модальне вікно рекорду -->
    <div class="modal-overlay" id="recordModal">
        <div class="modal-content">
            <h2>НОВИЙ РЕКОРД!</h2>
            <p id="recordModalText">Спінер крутився 0.0 секунд!</p>
            <button class="modal-btn" onclick="closeModal()">Чудово!</button>
        </div>
    </div>

    <script>
        // --- СИСТЕМА ТЕМ ---
        const themeBtn = document.getElementById('themeBtn');
        let isDark = localStorage.getItem('theme') === 'dark';

        function applyTheme() {
            if (isDark) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        }
        applyTheme();

        themeBtn.addEventListener('click', () => {
            isDark = !isDark;
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            applyTheme();
        });

        // --- АУДІО ДВИЖОК ---
        let audioCtx, whirrOsc, whirrGain, whirrFilter;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                whirrOsc = audioCtx.createOscillator();
                whirrOsc.type = 'sawtooth';
                whirrOsc.frequency.value = 70;

                whirrFilter = audioCtx.createBiquadFilter();
                whirrFilter.type = 'lowpass';
                whirrFilter.frequency.value = 1800;

                whirrGain = audioCtx.createGain();
                whirrGain.gain.value = 0;

                whirrOsc.connect(whirrFilter);
                whirrFilter.connect(whirrGain);
                whirrGain.connect(audioCtx.destination);
                whirrOsc.start();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function updateWhirrSound(speed) {
            if (!audioCtx) return;
            const targetFreq = 70 + speed * 6;
            const targetGain = Math.min(0.13, (speed / 60) * 0.13);
            whirrFilter.frequency.setTargetAtTime(900 + speed * 14, audioCtx.currentTime, 0.05);
            whirrOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.05);
            whirrGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.08);
        }

        function playClick() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(220, audioCtx.currentTime + 0.08);
            g.gain.setValueAtTime(0.12, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.start(); osc.stop(audioCtx.currentTime + 0.08);
        }

        function playRecordFanfare() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2);
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.3);
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);
            osc.start(); osc.stop(audioCtx.currentTime + 0.8);
        }

        // --- ФІЗИКА ОБЕРТАННЯ ---
        const COULOMB = 0.4;     
        const VISCOUS = 0.04;    
        const STOP_EPS = 0.03;   
        const VEL_BOOST = 1.6;   
        const MAX_AV = 90;       
        const MIN_START_AV = 1.0; 

        let angle = 0;            
        let angularVelocity = 0;  
        let isDragging = false;
        let spinActive = false;
        let spinStartPerf = 0;
        let recordTime = parseFloat(localStorage.getItem('fidget_spinner_record') || '0');

        let dragCenter = { x: 0, y: 0 };
        let dragSamples = [];
        let lastDragAngle = 0;
        let liveAv = 0;
        let lastMoveTime = 0;

        const spinnerArms = document.getElementById('spinnerArms');
        const spinnerStage = document.getElementById('spinnerStage');
        const spinnerBoard = document.getElementById('spinnerBoard');
        const hintText = document.getElementById('hintText');
        const timeVal = document.getElementById('timeVal');
        const rpmVal = document.getElementById('rpmVal');
        const recordVal = document.getElementById('recordVal');
        const recordModal = document.getElementById('recordModal');
        const recordModalText = document.getElementById('recordModalText');

        if (recordTime > 0) recordVal.textContent = recordTime.toFixed(1) + ' с';

        function getAngleFromEvent(e) {
            // Центр розраховується відносно стабільного board (щоб не було "воблу")
            const dx = e.clientX - dragCenter.x;
            const dy = e.clientY - dragCenter.y;
            return Math.atan2(dy, dx);
        }

        spinnerStage.addEventListener('pointerdown', (e) => {
            initAudio();
            playClick();
            
            const rect = spinnerBoard.getBoundingClientRect();
            dragCenter.x = rect.left + rect.width / 2;
            dragCenter.y = rect.top + rect.height / 2;

            isDragging = true;
            angularVelocity = 0;
            spinActive = false;
            liveAv = 0;
            lastDragAngle = getAngleFromEvent(e);
            lastMoveTime = performance.now();
            dragSamples = [{ t: lastMoveTime, angle: angle }];
            
            spinnerStage.classList.add('grabbing');
            spinnerStage.setPointerCapture(e.pointerId);
            hintText.style.opacity = '0';
        });

        spinnerStage.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const now = performance.now();
            const newPointerAngle = getAngleFromEvent(e);
            let delta = newPointerAngle - lastDragAngle;
            
            if (delta > Math.PI) delta -= 2 * Math.PI;
            if (delta < -Math.PI) delta += 2 * Math.PI;

            angle += delta;

            const dtMove = (now - lastMoveTime) / 1000;
            if (dtMove > 0.001) liveAv = delta / dtMove;

            lastDragAngle = newPointerAngle;
            lastMoveTime = now;

            dragSamples.push({ t: now, angle });
            while (dragSamples.length > 2 && now - dragSamples[0].t > 150) dragSamples.shift();
        });

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            spinnerStage.classList.remove('grabbing');
            const now = performance.now();

            let av = 0;
            if (dragSamples.length >= 2) {
                const first = dragSamples[0];
                const last = dragSamples[dragSamples.length - 1];
                const dt = (last.t - first.t) / 1000;
                if (dt > 0.005) av = (last.angle - first.angle) / dt;
            }
            av *= VEL_BOOST;
            av = Math.max(-MAX_AV, Math.min(MAX_AV, av));

            if (Math.abs(av) >= MIN_START_AV) {
                angularVelocity = av;
                spinActive = true;
                spinStartPerf = now;
                timeVal.textContent = '0.0';
            } else {
                angularVelocity = 0;
            }
            liveAv = 0;
        }

        spinnerStage.addEventListener('pointerup', endDrag);
        spinnerStage.addEventListener('pointercancel', endDrag);

        function finishSpin() {
            spinActive = false;
            const elapsed = (performance.now() - spinStartPerf) / 1000;
            timeVal.textContent = elapsed.toFixed(1);

            if (elapsed > recordTime + 0.05) {
                recordTime = elapsed;
                localStorage.setItem('fidget_spinner_record', recordTime.toFixed(1));
                recordVal.textContent = recordTime.toFixed(1) + ' с';
                celebrateRecord(elapsed);
            }
        }

        function celebrateRecord(elapsed) {
            playRecordFanfare();
            const duration = 1200;
            const end = Date.now() + duration;
            (function frame() {
                confetti({
                    particleCount: 4, angle: 60, spread: 55, origin: { x: 0 },
                    colors: ['#06D6A0', '#118AB2', '#FFD166', '#EF476F']
                });
                confetti({
                    particleCount: 4, angle: 120, spread: 55, origin: { x: 1 },
                    colors: ['#06D6A0', '#118AB2', '#FFD166', '#EF476F']
                });
                if (Date.now() < end) requestAnimationFrame(frame);
                else {
                    recordModalText.textContent = `Спінер крутився ${elapsed.toFixed(1)} секунд!`;
                    recordModal.classList.add('active');
                }
            }());
        }

        // Робимо функцію глобальною для виклику з HTML
        window.closeModal = function() {
            recordModal.classList.remove('active');
        };

        // --- ОСНОВНИЙ ЦИКЛ АНІМАЦІЇ ---
        let lastFrameTime = performance.now();

        function loop(now) {
            let dt = (now - lastFrameTime) / 1000;
            lastFrameTime = now;
            if (dt > 0.05) dt = 0.05; 

            if (!isDragging && angularVelocity !== 0) {
                const dir = Math.sign(angularVelocity);
                const decel = (COULOMB + VISCOUS * Math.abs(angularVelocity)) * dir;
                let newAv = angularVelocity - decel * dt;

                if (Math.sign(newAv) !== dir || Math.abs(newAv) < STOP_EPS) newAv = 0;

                angularVelocity = newAv;
                angle += angularVelocity * dt;

                if (angularVelocity === 0 && spinActive) finishSpin();
            }

            updateVisuals();
            requestAnimationFrame(loop);
        }

        function updateVisuals() {
            const deg = (angle * 180 / Math.PI) % 360;
            spinnerArms.setAttribute('transform', `rotate(${deg} 100 100)`);

            const speed = isDragging ? Math.abs(liveAv) : Math.abs(angularVelocity);
            const clampedSpeed = Math.min(MAX_AV, speed);

            rpmVal.textContent = Math.round(clampedSpeed * 9.5493);

            if (spinActive) {
                const elapsed = (performance.now() - spinStartPerf) / 1000;
                timeVal.textContent = elapsed.toFixed(1);
            }

            updateWhirrSound(clampedSpeed);
        }

        requestAnimationFrame(loop);

    </script>
</body>
</html>
