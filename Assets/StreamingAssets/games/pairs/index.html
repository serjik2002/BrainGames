<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brain Games - Знайди пару</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            /* Light Theme */
            --bg-color: #F8F9FA;
            --text-main: #1C2331;
            --text-sub: #7A8294;
            --board-bg: #E8ECEF;
            
            /* Premium Card Design */
            --card-cover-bg: #A2C4C9; /* Пастельний синій */
            --card-cover-shadow: #8AB4B9;
            --card-face-bg: #FFFFFF; /* Біле тло для різнокольорових іконок */
            --icon-color: #FFFFFF; /* Колір зірки на сорочці */
            --color-green: #A8D5BA; /* Для кнопок */
            
            --shadow-color: rgba(0, 0, 0, 0.08);
            --modal-bg: rgba(255, 255, 255, 0.95);
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-color: #12151A;
            --text-main: #E8ECEF;
            --text-sub: #A0AABF;
            --board-bg: #1E252D;
            
            /* Premium Card Design - Dark */
            --card-cover-bg: #52757C;
            --card-cover-shadow: #3E5A60;
            --card-face-bg: #2C3540; 
            --icon-color: #E8ECEF;
            --color-green: #6C9A7E;
            
            --shadow-color: rgba(0, 0, 0, 0.3);
            --modal-bg: rgba(30, 37, 45, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            /* Жорстке обмеження по висоті екрану */
            height: 100dvh;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Контейнер, який ідеально центрує все */
        .app-container {
            width: 100%;
            height: 100%;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        /* Формула ідеального вписування: 
           Ширина елементів ніколи не перевищить доступну висоту екрану мінус відступи (220px) */
        .top-bar, .header, .board-bg {
            width: 100%;
            max-width: min(100%, calc(100dvh - 220px));
        }

        /* Верхня панель (Тема + Рахунок) */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .theme-toggle {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: var(--board-bg);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            box-shadow: 0 4px 10px var(--shadow-color);
            transition: transform 0.2s, background 0.3s;
        }

        .theme-toggle:active {
            transform: scale(0.9);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .stats-container {
            display: flex;
            gap: 10px;
        }

        .stat-badge {
            background: var(--board-bg);
            padding: 8px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px var(--shadow-color);
            transition: background 0.3s;
        }

        .stat-badge .icon {
            font-size: 1.3rem;
        }

        /* Заголовок */
        .header {
            text-align: center;
            margin-bottom: 5px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .header p {
            font-size: 1rem;
            color: var(--text-sub);
            font-weight: 700;
        }

        /* Ігрове поле */
        .board-bg {
            background-color: var(--board-bg);
            border-radius: 24px;
            padding: 10px;
            aspect-ratio: 1; /* Завжди ідеальний квадрат */
            box-shadow: inset 0 4px 10px var(--shadow-color);
            transition: background-color 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .board {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(var(--grid-cols), 1fr);
            grid-template-rows: repeat(var(--grid-rows), 1fr);
            gap: min(1.5vw, 8px);
        }

        /* Картка */
        .card {
            perspective: 1000px;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner,
        .card.matched .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched .card-face {
            opacity: 0.8;
            transform: rotateY(180deg) scale(0.95);
            transition: transform 0.3s, opacity 0.3s;
        }

        .card-cover, .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Сорочка картки (Преміум синій) */
        .card-cover {
            background-color: var(--card-cover-bg);
            box-shadow: 0 4px 0 var(--card-cover-shadow);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .card-cover svg {
            width: 45%;
            height: 45%;
            fill: var(--icon-color);
            opacity: 0.8;
        }

        /* Лицьова сторона (світле/темне тло для яскравого емодзі) */
        .card-face {
            background-color: var(--card-face-bg);
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            transform: rotateY(180deg);
            transition: background-color 0.3s;
        }

        /* Модальне вікно */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: var(--modal-bg);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transform: translateY(20px) scale(0.95);
            transition: transform 0.3s;
            max-width: 90%;
            width: 320px;
        }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }

        .modal h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .modal p {
            font-size: 1.2rem;
            color: var(--text-sub);
            margin-bottom: 25px;
            font-weight: 700;
        }

        .btn {
            background-color: var(--color-green);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.15);
            transition: transform 0.1s, box-shadow 0.1s;
            width: 100%;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.15);
        }

    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Верхня панель -->
        <div class="top-bar">
            <button class="theme-toggle" id="themeBtn" aria-label="Перемкнути тему">
                <svg id="themeIcon" viewBox="0 0 24 24">
                    <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06z"/>
                </svg>
            </button>
            <div class="stats-container">
                <div class="stat-badge">
                    <span class="icon">🏆</span>
                    <span class="score-text" id="levelDisplay">1/4</span>
                </div>
                <div class="stat-badge">
                    <span class="icon">⭐</span>
                    <span class="score-text" id="scoreDisplay">0</span>
                </div>
            </div>
        </div>

        <!-- Заголовок -->
        <div class="header">
            <h1>Знайди пару</h1>
            <p>Тренуй свою пам'ять</p>
        </div>

        <!-- Ігрове поле -->
        <div class="board-bg">
            <div class="board" id="board">
                <!-- Картки генеруються через JS -->
            </div>
        </div>

    </div>

    <!-- Модальне вікно -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 id="modalTitle">Чудово!</h2>
            <p id="modalDesc">Рівень 1 пройдено</p>
            <button class="btn" id="modalBtn">Далі</button>
        </div>
    </div>

    <script>
        // --- 1. АУДІО ДВИЖОК ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            
            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'match') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.setValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'error') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'win') {
                const notes = [440, 554, 659, 880];
                notes.forEach((freq, i) => {
                    const oscW = audioCtx.createOscillator();
                    const gainW = audioCtx.createGain();
                    oscW.type = 'sine';
                    oscW.connect(gainW);
                    gainW.connect(audioCtx.destination);
                    
                    oscW.frequency.value = freq;
                    gainW.gain.setValueAtTime(0, now + i * 0.1);
                    gainW.gain.linearRampToValueAtTime(0.3, now + i * 0.1 + 0.05);
                    gainW.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.5);
                    
                    oscW.start(now + i * 0.1);
                    oscW.stop(now + i * 0.1 + 0.5);
                });
            }
        }

        // --- 2. СИСТЕМА ТЕМ ---
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = document.getElementById('themeIcon');
        const sunPath = "M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06z";
        const moonPath = "M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z";

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            themeIcon.innerHTML = `<path d="${newTheme === 'dark' ? moonPath : sunPath}"/>`;
            localStorage.setItem('theme', newTheme);
            playSound('click');
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeIcon.innerHTML = `<path d="${savedTheme === 'dark' ? moonPath : sunPath}"/>`;
        themeBtn.addEventListener('click', toggleTheme);


        // --- 3. ЛОГІКА ГРИ "ЗНАЙДИ ПАРУ" ---
        const board = document.getElementById('board');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const levelDisplay = document.getElementById('levelDisplay');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        const modalBtn = document.getElementById('modalBtn');

        let currentLevel = 1; // Рівні тепер безкінечні
        let score = 0;
        let flippedCards = [];
        let matchedPairs = 0;
        let isLocked = false;
        let totalPairs = 0;

        // Повністю різнокольорові, красиві емодзі іконки (32 унікальні для фінального рівня)
        const premiumIcons = [
            '🍎', '🍌', '🍉', '🍇', '🍓', '🍒', '🍑', '🍍', 
            '🥝', '🍅', '🍆', '🥑', '🍔', '🍕', '🍟', '🍩', 
            '🍦', '🍭', '🍬', '🍫', '🍿', '🎈', '🎁', '🧸', 
            '🚗', '🚀', '🚁', '⛵', '⛺', '🏝️', '🌟', '💎'
        ];

        // Прогресія складності: кожні 3 рівні сітка збільшується
        function getLevelConfig(level) {
            const stageIndex = Math.floor((level - 1) / 3);
            const stages = [
                { cols: 2, rows: 2, pairs: 2 },    // Рівні 1-3: 2x2 (4 картки)
                { cols: 3, rows: 4, pairs: 6 },    // Рівні 4-6: 3x4 (12 карток) - замість 3х3
                { cols: 4, rows: 4, pairs: 8 },    // Рівні 7-9: 4x4 (16 карток)
                { cols: 5, rows: 4, pairs: 10 },   // Рівні 10-12: 5x4 (20 карток)
                { cols: 6, rows: 6, pairs: 18 },   // Рівні 13-15: 6x6 (36 карток)
                { cols: 8, rows: 6, pairs: 24 },   // Рівні 16-18: 8x6 (48 карток)
                { cols: 8, rows: 8, pairs: 32 }    // Рівні 19+: 8x8 (64 картки)
            ];
            return stages[Math.min(stageIndex, stages.length - 1)];
        }

        function generateDeck(pairsCount) {
            let availableIcons = premiumIcons.slice(0, pairsCount);
            // Дублюємо для створення пар
            let deck = [...availableIcons, ...availableIcons];
            
            // Перемішуємо (алгоритм Fisher-Yates для ідеального рандому)
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck;
        }

        function initGame() {
            const config = getLevelConfig(currentLevel);
            board.style.setProperty('--grid-cols', config.cols);
            board.style.setProperty('--grid-rows', config.rows);
            totalPairs = config.pairs;
            
            matchedPairs = 0;
            flippedCards = [];
            isLocked = false;
            
            levelDisplay.innerText = `Рів. ${currentLevel}`;
            
            const deck = generateDeck(totalPairs);
            board.innerHTML = '';
            
            deck.forEach((iconData, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.icon = iconData;
                
                // SVG використовується як контейнер, щоб емодзі ідеально масштабувалось під розмір картки
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-cover">
                            <!-- Красива преміум зірочка на сорочці -->
                            <svg viewBox="0 0 100 100">
                                <polygon points="50,20 60,40 82,40 64,55 71,78 50,65 29,78 36,55 18,40 40,40"/>
                            </svg>
                        </div>
                        <div class="card-face">
                            <svg viewBox="0 0 100 100">
                                <text x="50" y="55" font-size="65" text-anchor="middle" dominant-baseline="middle">${iconData}</text>
                            </svg>
                        </div>
                    </div>
                `;
                
                card.addEventListener('click', () => flipCard(card));
                board.appendChild(card);
            });
        }

        function flipCard(card) {
            if (isLocked) return;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            playSound('click');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                isLocked = true;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.icon === card2.dataset.icon;

            if (isMatch) {
                matchedPairs++;
                score += (10 * currentLevel);
                scoreDisplay.innerText = score;
                
                playSound('match');
                card1.classList.add('matched');
                card2.classList.add('matched');
                
                flippedCards = [];
                isLocked = false;
                
                if (matchedPairs === totalPairs) {
                    setTimeout(handleWin, 500);
                }
            } else {
                playSound('error');
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    playSound('click');
                    flippedCards = [];
                    isLocked = false;
                }, 800);
            }
        }

        function handleWin() {
            playSound('win');
            
            // Салют
            const duration = 2000;
            const end = Date.now() + duration;
            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#A8D5BA', '#A2C4C9', '#F4D068', '#F2A6A6', '#C8B8D8']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#A8D5BA', '#A2C4C9', '#F4D068', '#F2A6A6', '#C8B8D8']
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            // Модальне вікно
            setTimeout(() => {
                modalTitle.innerText = "Геніально!";
                modalDesc.innerText = `Ви пройшли рівень ${currentLevel}!`;
                modalBtn.innerText = "Наступний рівень";
                modal.classList.add('active');
            }, 800);
        }

        modalBtn.addEventListener('click', () => {
            playSound('click');
            modal.classList.remove('active');
            
            currentLevel++;
            
            setTimeout(initGame, 300);
        });

        // Запуск гри
        initGame();

    </script>
</body>
</html>
