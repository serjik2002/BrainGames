<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Міні-гра: Match 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Базові змінні кольорів та розмірів (Світла тема) */
        :root {
            --bg-color: #F8F9FA;
            --surface-color: #FFFFFF;
            --text-main: #1C2331;
            --text-sec: #7A8294;
            --accent-green: #5FC982;
            --board-bg: #F0F2F5;
            --shadow-color: rgba(0,0,0,0.04);
            --tile-icon-color: rgba(0, 0, 0, 0.15);
            
            --color-green: #A5D6B6;
            --color-blue: #B5CBEB;
            --color-yellow: #FCE199;
            --color-pink: #F8C8C9;
            --color-purple: #D7D0F1;
        }

        /* Змінні для темної теми */
        [data-theme="dark"] {
            --bg-color: #161821;
            --surface-color: #242735;
            --text-main: #FFFFFF;
            --text-sec: #8A92A6;
            --board-bg: #1A1D28;
            --shadow-color: rgba(0,0,0,0.3);
            --tile-icon-color: rgba(0, 0, 0, 0.25);
            
            /* Темніші відтінки фішок для темної теми */
            --color-green: #7BA88B;
            --color-blue: #869BC2;
            --color-yellow: #D6BD7A;
            --color-pink: #D1A3A4;
            --color-purple: #B2ABC9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100dvh; 
            overflow: hidden;
            touch-action: none; 
        }

        /* --- ВЕРХНЯ ПАНЕЛЬ --- */
        .stat-pill {
            background: var(--surface-color);
            padding: 6px 14px;
            border-radius: 24px;
            box-shadow: 0 4px 12px var(--shadow-color);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 800;
            font-size: 15px;
            color: var(--text-main);
        }

        .stat-pill svg { width: 18px; height: 18px; }

        .theme-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--surface-color);
            box-shadow: 0 4px 12px var(--shadow-color);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-main);
            transition: transform 0.2s ease, background-color 0.3s ease;
        }

        .theme-btn:active { transform: scale(0.9); }
        .theme-btn svg { width: 24px; height: 24px; fill: currentColor; }

        /* --- ОСНОВНИЙ КОНТЕЙНЕР --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            width: 100%;
        }

        .app-container {
            width: 100%;
            max-width: min(500px, 65vh);
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }

        .title-area {
            width: 100%;
            text-align: left;
            margin-bottom: 2vh;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        p.subtitle {
            font-size: 14px;
            color: var(--text-sec);
            font-weight: 400;
        }

        /* --- ІГРОВЕ ПОЛЕ --- */
        .game-wrapper {
            width: 100%;
            aspect-ratio: 1; 
            background: var(--surface-color);
            border-radius: 24px;
            box-shadow: 0 8px 24px var(--shadow-color);
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .board-bg {
            width: 100%;
            height: 100%;
            background: var(--board-bg);
            border-radius: 16px;
            padding: 6px; 
            box-sizing: border-box;
            overflow: hidden;
        }

        .board {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* --- ФІШКИ --- */
        .tile {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 25%;
            cursor: pointer;
            transition: transform 0.2s ease, top 0.3s ease, left 0.3s ease, opacity 0.2s ease;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1);
            padding-bottom: 4px; 
        }

        .tile.selected {
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 8px 16px var(--shadow-color), inset 0 -4px 0 rgba(0,0,0,0.1);
        }

        .tile.matched {
            transform: scale(0);
            opacity: 0;
        }

        .tile svg {
            width: 50%;
            height: 50%;
            fill: var(--tile-icon-color); 
            display: block; 
        }

        .type-0 { background-color: var(--color-green); }
        .type-1 { background-color: var(--color-blue); }
        .type-2 { background-color: var(--color-yellow); }
        .type-3 { background-color: var(--color-pink); }
        .type-4 { background-color: var(--color-purple); }

        /* --- МОДАЛЬНЕ ВІКНО ПЕРЕМОГИ --- */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            background: var(--surface-color);
            padding: 32px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 16px 32px var(--shadow-color);
            transform: translateY(20px);
            transition: transform 0.3s ease;
            width: 80%;
            max-width: 320px;
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .modal-content h2 {
            font-size: 28px;
            margin-bottom: 8px;
            color: var(--accent-green);
        }
        .modal-content p {
            color: var(--text-sec);
            margin-bottom: 24px;
            font-size: 16px;
        }
        .play-again-btn {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(95, 201, 130, 0.3);
            transition: transform 0.1s ease;
        }
        .play-again-btn:active {
            transform: scale(0.95);
        }

    </style>
</head>
<body>

    <main>
        <div class="app-container">
            
            <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5vh; margin-top: 1vh;">
                <button class="theme-btn" id="themeToggleBtn" aria-label="Перемкнути тему">
                    <svg class="sun-icon" viewBox="0 0 24 24" style="display: none;"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06z"/></svg>
                    <svg class="moon-icon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4C12.92 3.04 12.46 3 12 3zm0 16c-3.86 0-7-3.14-7-7s3.14-7 7-7c.2 0 .4.02.59.05-.73.68-1.19 1.66-1.19 2.75 0 2.09 1.71 3.8 3.8 3.8 1.09 0 2.07-.46 2.75-1.19.03.2.05.4.05.59 0 3.86-3.14 7-7 7z"/></svg>
                </button>
                <div class="stat-pill">
                    <svg viewBox="0 0 24 24" fill="#FCE199"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                    <span id="scoreText">0 / 1000</span>
                </div>
            </div>

            <div class="title-area">
                <h1>Match 3</h1>
                <p class="subtitle">Збирай лінії однакових фігур</p>
            </div>

            <div class="game-wrapper">
                <div class="board-bg">
                    <div class="board" id="board"></div>
                </div>
            </div>

            <!-- Модальне вікно перемоги -->
            <div class="modal-overlay" id="winModal">
                <div class="modal-content">
                    <h2>ПЕРЕМОГА!</h2>
                    <p>Ціль у 1000 очок досягнута!</p>
                    <button class="play-again-btn" onclick="restartGame()">Грати ще</button>
                </div>
            </div>

        </div>
    </main>

    <script>
        // --- АУДІО ДВИЖОК (Web Audio API) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'swipe') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } 
            else if (type === 'match') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
            else if (type === 'win') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2);
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.8);
            }
        }

        // --- ЛОГІКА ТЕМИ ---
        const themeBtn = document.getElementById('themeToggleBtn');
        const sunIcon = themeBtn.querySelector('.sun-icon');
        const moonIcon = themeBtn.querySelector('.moon-icon');

        let isDark = localStorage.getItem('match3_theme') === 'dark';
        
        function applyTheme() {
            if (isDark) {
                document.documentElement.setAttribute('data-theme', 'dark');
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            } else {
                document.documentElement.removeAttribute('data-theme');
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            }
        }
        
        applyTheme();

        themeBtn.addEventListener('click', () => {
            isDark = !isDark;
            localStorage.setItem('match3_theme', isDark ? 'dark' : 'light');
            applyTheme();
        });

        // --- НАЛАШТУВАННЯ ГРИ ---
        const BOARD_SIZE = 8;
        const TILE_TYPES = 5;
        const TILE_PADDING = 3;
        const TARGET_SCORE = 1000;
        
        let grid = [];
        let domTiles = {};
        let idCounter = 0;
        let score = 0;
        let isAnimating = false;
        let selectedTile = null;
        let isGameWon = false;

        const boardEl = document.getElementById('board');
        const scoreTextEl = document.getElementById('scoreText');
        const winModal = document.getElementById('winModal');

        // Іконки
        const icons = [
            '<circle cx="50" cy="50" r="35" />', 
            '<rect x="15" y="15" width="70" height="70" rx="18" />', 
            '<path d="M50 10 L62 38 L92 38 L68 56 L78 86 L50 68 L22 86 L32 56 L8 38 L38 38 Z" />', 
            '<path d="M50 15 L85 80 L15 80 Z" stroke-linejoin="round" />', 
            '<polygon points="50,10 90,50 50,90 10,50" />' 
        ];

        function initGame() {
            grid = [];
            domTiles = {};
            boardEl.innerHTML = '';
            idCounter = 0;
            score = 0;
            isGameWon = false;
            winModal.classList.remove('active');
            updateScore(0);
            
            for (let r = 0; r < BOARD_SIZE; r++) {
                grid[r] = [];
                for (let c = 0; c < BOARD_SIZE; c++) {
                    let type;
                    do {
                        type = Math.floor(Math.random() * TILE_TYPES);
                    } while (
                        (c >= 2 && grid[r][c-1]?.type === type && grid[r][c-2]?.type === type) ||
                        (r >= 2 && grid[r-1][c]?.type === type && grid[r-2][c]?.type === type)
                    );
                    let tile = { id: idCounter++, r, c, type };
                    grid[r][c] = tile;
                    createDOMTile(tile);
                }
            }
            updateTilePositions();
        }

        function createDOMTile(tile) {
            const el = document.createElement('div');
            el.className = `tile type-${tile.type}`;
            el.innerHTML = `<svg viewBox="0 0 100 100">${icons[tile.type]}</svg>`;
            el.dataset.id = tile.id;
            boardEl.appendChild(el);
            domTiles[tile.id] = el;
            return el;
        }

        function updateTilePositions() {
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const tile = grid[r][c];
                    if (tile) {
                        const el = domTiles[tile.id];
                        el.style.width = `calc(${100 / BOARD_SIZE}% - ${TILE_PADDING * 2}px)`;
                        el.style.height = `calc(${100 / BOARD_SIZE}% - ${TILE_PADDING * 2}px)`;
                        el.style.left = `calc(${c * (100 / BOARD_SIZE)}% + ${TILE_PADDING}px)`;
                        el.style.top = `calc(${r * (100 / BOARD_SIZE)}% + ${TILE_PADDING}px)`;
                    }
                }
            }
        }

        // --- ЛОГІКА СВАЙПІВ ТА КЛІКІВ ---
        let startX, startY;
        let swipeTileId = null;

        boardEl.addEventListener('pointerdown', (e) => {
            if(isAnimating || isGameWon) return; 
            initAudio(); 

            const target = e.target.closest('.tile');
            if (target) {
                swipeTileId = parseInt(target.dataset.id);
                startX = e.clientX;
                startY = e.clientY;
                
                if(selectedTile) domTiles[selectedTile.id].classList.remove('selected');
                domTiles[swipeTileId].classList.add('selected');
            }
        });

        window.addEventListener('pointerup', (e) => {
            if (!swipeTileId || isAnimating || isGameWon) {
                swipeTileId = null;
                return;
            }

            const endX = e.clientX;
            const endY = e.clientY;
            const dx = endX - startX;
            const dy = endY - startY;

            domTiles[swipeTileId].classList.remove('selected');

            if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
                handleSwipeDirection(swipeTileId, dx, dy);
                selectedTile = null; 
            } else {
                handleTileClick(swipeTileId);
            }
            
            swipeTileId = null;
        });

        function handleSwipeDirection(id, dx, dy) {
            let t1 = getTileById(id);
            if (!t1) return;

            let targetR = t1.r;
            let targetC = t1.c;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0) targetC += 1; 
                else targetC -= 1; 
            } else {
                if (dy > 0) targetR += 1; 
                else targetR -= 1; 
            }

            if (targetR >= 0 && targetR < BOARD_SIZE && targetC >= 0 && targetC < BOARD_SIZE) {
                let t2 = grid[targetR][targetC];
                if (t2) {
                    playSound('swipe');
                    trySwap(t1, t2);
                }
            }
        }

        async function handleTileClick(id) {
            let clickedTile = getTileById(id);
            if (!clickedTile) return;

            if (!selectedTile) {
                selectedTile = clickedTile;
                domTiles[id].classList.add('selected');
                playSound('swipe');
                return;
            }

            if (selectedTile.id === id) {
                selectedTile = null;
                return;
            }

            const isAdjacent = (Math.abs(selectedTile.r - clickedTile.r) === 1 && selectedTile.c === clickedTile.c) ||
                               (Math.abs(selectedTile.c - clickedTile.c) === 1 && selectedTile.r === clickedTile.r);

            if (isAdjacent) {
                playSound('swipe');
                await trySwap(selectedTile, clickedTile);
                selectedTile = null;
            } else {
                domTiles[selectedTile.id]?.classList.remove('selected');
                selectedTile = clickedTile;
                domTiles[id].classList.add('selected');
                playSound('swipe');
            }
        }

        function getTileById(id) {
            for(let r=0; r<BOARD_SIZE; r++)
                for(let c=0; c<BOARD_SIZE; c++)
                    if(grid[r][c] && grid[r][c].id === id) return grid[r][c];
            return null;
        }

        // --- ЛОГІКА ОБМІНУ ТА ЗНИКНЕННЯ ---
        async function trySwap(t1, t2) {
            isAnimating = true;
            swapLogic(t1, t2);
            updateTilePositions();
            await sleep(250);

            const matches = findMatches();
            if (matches.length > 0) {
                await processMatches(matches);
            } else {
                swapLogic(t1, t2);
                updateTilePositions();
                await sleep(250);
                isAnimating = false;
            }
        }

        function swapLogic(t1, t2) {
            grid[t1.r][t1.c] = t2;
            grid[t2.r][t2.c] = t1;
            const tempR = t1.r, tempC = t1.c;
            t1.r = t2.r; t1.c = t2.c;
            t2.r = tempR; t2.c = tempC;
        }

        function findMatches() {
            let matchedIds = new Set();
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE - 2; c++) {
                    let t1 = grid[r][c], t2 = grid[r][c+1], t3 = grid[r][c+2];
                    if (t1 && t2 && t3 && t1.type === t2.type && t2.type === t3.type) {
                        matchedIds.add(t1.id).add(t2.id).add(t3.id);
                        let k = c + 3;
                        while (k < BOARD_SIZE && grid[r][k]?.type === t1.type) matchedIds.add(grid[r][k++].id);
                    }
                }
            }
            for (let c = 0; c < BOARD_SIZE; c++) {
                for (let r = 0; r < BOARD_SIZE - 2; r++) {
                    let t1 = grid[r][c], t2 = grid[r+1][c], t3 = grid[r+2][c];
                    if (t1 && t2 && t3 && t1.type === t2.type && t2.type === t3.type) {
                        matchedIds.add(t1.id).add(t2.id).add(t3.id);
                        let k = r + 3;
                        while (k < BOARD_SIZE && grid[k][c]?.type === t1.type) matchedIds.add(grid[k++][c].id);
                    }
                }
            }
            return Array.from(matchedIds);
        }

        async function processMatches(matchedIds) {
            playSound('match'); 
            updateScore(score + matchedIds.length * 10);

            matchedIds.forEach(id => domTiles[id].classList.add('matched'));
            await sleep(200);

            matchedIds.forEach(id => {
                domTiles[id]?.remove();
                delete domTiles[id];
                for(let r=0; r<BOARD_SIZE; r++)
                    for(let c=0; c<BOARD_SIZE; c++)
                        if(grid[r][c]?.id === id) grid[r][c] = null;
            });

            await applyGravity();
        }

        async function applyGravity() {
            let moved = false;
            for (let c = 0; c < BOARD_SIZE; c++) {
                for (let r = BOARD_SIZE - 1; r >= 0; r--) {
                    if (grid[r][c] === null) {
                        for (let k = r - 1; k >= 0; k--) {
                            if (grid[k][c] !== null) {
                                grid[r][c] = grid[k][c];
                                grid[r][c].r = r;
                                grid[k][c] = null;
                                moved = true;
                                break;
                            }
                        }
                    }
                }
            }

            for (let c = 0; c < BOARD_SIZE; c++) {
                for (let r = 0; r < BOARD_SIZE; r++) {
                    if (grid[r][c] === null) {
                        let type = Math.floor(Math.random() * TILE_TYPES);
                        let tile = { id: idCounter++, r, c, type };
                        grid[r][c] = tile;
                        let el = createDOMTile(tile);
                        el.style.top = `calc(-100% / ${BOARD_SIZE})`; 
                        el.style.left = `calc(${c * (100 / BOARD_SIZE)}% + ${TILE_PADDING}px)`;
                        el.getBoundingClientRect(); 
                        moved = true;
                    }
                }
            }

            if (moved) {
                updateTilePositions();
                await sleep(300);
                const newMatches = findMatches();
                if (newMatches.length > 0) await processMatches(newMatches);
                else isAnimating = false;
            } else {
                isAnimating = false;
            }
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
        
        function updateScore(newScore) { 
            score = newScore; 
            const displayScore = score > TARGET_SCORE ? TARGET_SCORE : score;
            scoreTextEl.innerText = `${displayScore} / ${TARGET_SCORE}`; 

            if (score >= TARGET_SCORE && !isGameWon) {
                triggerWin();
            }
        }

        function triggerWin() {
            isGameWon = true;
            playSound('win');
            
            const duration = 2500;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5, angle: 60, spread: 55, origin: { x: 0 },
                    colors: ['#A5D6B6', '#B5CBEB', '#FCE199', '#F8C8C9', '#D7D0F1']
                });
                confetti({
                    particleCount: 5, angle: 120, spread: 55, origin: { x: 1 },
                    colors: ['#A5D6B6', '#B5CBEB', '#FCE199', '#F8C8C9', '#D7D0F1']
                });

                if (Date.now() < end) requestAnimationFrame(frame);
                else winModal.classList.add('active'); 
            }());
        }

        function restartGame() {
            initGame();
        }
        
        window.addEventListener('resize', () => { if(!isAnimating && !isGameWon) updateTilePositions(); });
        
        // Запуск
        initGame();
    </script>
</body>
</html>
