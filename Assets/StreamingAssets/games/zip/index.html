<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zip - Головоломка</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

        :root {
            --bg-color: #f8f9fa;
            --text-color: #1c2331;
            --board-bg: #e2e8f0; /* Світле поле */
            --cell-bg: rgba(0, 0, 0, 0.04); /* Легке затемнення для пустих клітинок */
            --node-bg: #ffffff;
            --node-text: #1c2331;
            --btn-bg: #e2e8f0; /* Світлі кнопки */
            --btn-text: #1c2331; /* Темний текст на кнопках */
            --shadow: rgba(0, 0, 0, 0.1);
            --accent: #E83F6F;
        }

        [data-theme="dark"] {
            --bg-color: #121418;
            --text-color: #f8f9fa;
            --board-bg: #1A1D24;
            --cell-bg: rgba(255, 255, 255, 0.03);
            --node-bg: #ffffff;
            --node-text: #1c2331;
            --btn-bg: #2B2F3A;
            --btn-text: #ffffff;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .app-container {
            width: 100%;
            /* Збільшив відрахування до 260px, щоб гра гарантовано не вилазила по висоті */
            max-width: min(100%, calc(100dvh - 260px));
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .theme-toggle {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: var(--btn-bg);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 4px 10px var(--shadow);
            transition: transform 0.2s;
        }
        .theme-toggle:active { transform: scale(0.9); }

        .score-container {
            display: flex;
            align-items: center;
            background: var(--btn-bg);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: 800;
            color: var(--btn-text);
            box-shadow: 0 4px 10px var(--shadow);
        }

        .score-container span {
            color: #FFD166;
            margin-right: 8px;
            font-size: 24px;
        }

        h1 {
            margin: 0 0 20px 0;
            font-size: 32px;
            text-align: center;
            letter-spacing: 2px;
        }

        .board-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background-color: var(--board-bg);
            border-radius: 24px;
            padding: 2%;
            box-shadow: 0 10px 30px var(--shadow);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 2;
        }

        .cell {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: var(--cell-bg);
            border-radius: 12px;
            margin: 2px;
        }

        .node {
            width: 65%;
            height: 65%;
            background-color: var(--node-bg);
            color: var(--node-text);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(16px, 5vw, 26px);
            font-weight: 900;
            z-index: 3;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
            transition: transform 0.2s;
        }

        /* SVG layer is completely independent of DOM cells */
        #svg-layer {
            position: absolute;
            top: 2%;
            left: 2%;
            width: 96%;
            height: 96%;
            pointer-events: none;
            z-index: 1;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            box-shadow: 0 4px 10px var(--shadow);
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-color);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: translateY(50px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 90%;
            max-width: 400px;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-content h2 {
            margin: 0 0 15px 0;
            font-size: 32px;
            color: var(--text-color);
        }
        
        .modal-content p {
            font-size: 18px;
            color: gray;
            margin-bottom: 25px;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
            transition: background-color 0.5s;
        }

        /* Всплывающее сообщение (Toast) */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--btn-bg);
            color: var(--text-color);
            padding: 14px 28px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 800;
            box-shadow: 0 10px 30px var(--shadow);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            z-index: 200;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">☀️</button>
        <div class="score-container">
            <span>★</span> <div id="scoreDisplay">0</div>
        </div>
    </div>

    <h1>ZIP</h1>

    <div class="board-container" id="board-container">
        <svg id="svg-layer" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid meet">
            <defs>
                <linearGradient id="pathGradient" x1="0" y1="0" x2="600" y2="600" gradientUnits="userSpaceOnUse">
                    <stop id="grad-start" offset="0%" stop-color="#C724B1" />
                    <stop id="grad-end" offset="100%" stop-color="#E83F6F" />
                </linearGradient>
            </defs>
            <path id="path-line" fill="none" stroke="url(#pathGradient)" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <div class="board" id="board"></div>
    </div>

    <!-- Залишив тільки одну велику кнопку -->
    <div class="controls">
        <button class="btn" onclick="resetPath()">Сброс</button>
    </div>
</div>

<div class="modal-overlay" id="winModal">
    <div class="modal-content">
        <h2>Победа!</h2>
        <p>Идеальный путь найден.</p>
        <button class="btn btn-primary" style="width: 100%;" onclick="nextLevel()">Следующий уровень</button>
    </div>
</div>

<!-- Контейнер для всплывающего сообщения -->
<div class="toast" id="toast"></div>

<script>
    // Аудио-движок
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'move') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400 + (path.length * 20), audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(600 + (path.length * 20), audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'back') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'win') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.2);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        }
    }

    // Тема
    let isDark = localStorage.getItem('theme') !== 'light';
    const htmlEl = document.documentElement;
    const themeBtn = document.getElementById('themeBtn');

    function updateThemeUI() {
        htmlEl.setAttribute('data-theme', isDark ? 'dark' : 'light');
        themeBtn.innerText = isDark ? '🌙' : '☀️';
    }

    function toggleTheme() {
        isDark = !isDark;
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        updateThemeUI();
    }
    updateThemeUI();

    // Палітри кольорів для лінії
    const palettes = [
        ['#C724B1', '#E83F6F'], // Pink-Red
        ['#4A00E0', '#8E2DE2'], // Blue-Purple
        ['#11998e', '#38ef7d'], // Green
        ['#FF512F', '#F09819'], // Orange
        ['#00c6ff', '#0072ff'], // Cyan-Blue
        ['#f12711', '#f5af19'], // Fire
        ['#833ab4', '#fd1d1d'], // Purple-Red
    ];

    let currentPalette = palettes[0];

    // Змінні гри
    const boardEl = document.getElementById('board');
    const pathLine = document.getElementById('path-line');
    const gradStart = document.getElementById('grad-start');
    const gradEnd = document.getElementById('grad-end');
    
    let score = parseInt(localStorage.getItem('zipScore') || '0');
    document.getElementById('scoreDisplay').innerText = score;

    const gridSize = 6;
    let levelData = [];
    let maxNumber = 0;
    const totalCells = gridSize * gridSize;

    let path = [];
    let isPointerDown = false;
    let nextExpectedNumber = 2;

    // Генератор Гамільтонового шляху (DFS з евристикою Варнсдорфа)
    function generateLevel() {
        let grid, finalMaxNum, finalPath;
        let success = false;

        while(!success) {
            let tempPath = [];
            let visited = Array(totalCells).fill(false);
            let found = false;

            function dfs(r, c) {
                if (found) return;
                tempPath.push({r, c});
                visited[r * gridSize + c] = true;

                if (tempPath.length === totalCells) {
                    found = true;
                    return;
                }

                let neighbors = [];
                let dirs = [[0,1], [1,0], [0,-1], [-1,0]];
                
                for(let [dr, dc] of dirs) {
                    let nr = r + dr, nc = c + dc;
                    if(nr>=0 && nr<gridSize && nc>=0 && nc<gridSize && !visited[nr*gridSize+nc]) {
                        let unv = 0;
                        for(let [ddr, ddc] of dirs) {
                            let nnr = nr+ddr, nnc = nc+ddc;
                            if(nnr>=0 && nnr<gridSize && nnc>=0 && nnc<gridSize && !visited[nnr*gridSize+nnc]) unv++;
                        }
                        neighbors.push({r: nr, c: nc, count: unv});
                    }
                }

                neighbors.sort(() => Math.random() - 0.5);
                neighbors.sort((a, b) => a.count - b.count);

                for (let n of neighbors) {
                    dfs(n.r, n.c);
                    if (found) return;
                }

                tempPath.pop();
                visited[r * gridSize + c] = false;
            }

            dfs(Math.floor(Math.random() * gridSize), Math.floor(Math.random() * gridSize));

            if (found && tempPath.length === totalCells) {
                success = true;
                finalPath = tempPath;
            }
        }

        // Кількість чекпоінтів від 8 до 15
        finalMaxNum = Math.floor(Math.random() * 8) + 8;
        grid = Array(gridSize).fill(0).map(() => Array(gridSize).fill(0));

        grid[finalPath[0].r][finalPath[0].c] = 1;
        grid[finalPath[totalCells-1].r][finalPath[totalCells-1].c] = finalMaxNum;

        let internalIndices = [];
        for(let i=1; i<totalCells-1; i++) internalIndices.push(i);
        internalIndices.sort(() => Math.random() - 0.5);

        let selected = internalIndices.slice(0, finalMaxNum - 2).sort((a,b) => a - b);
        for(let i=0; i<selected.length; i++) {
            let pt = finalPath[selected[i]];
            grid[pt.r][pt.c] = i + 2;
        }

        return { grid, maxNumber: finalMaxNum };
    }

    function applyNewLevel() {
        const generated = generateLevel();
        levelData = generated.grid;
        maxNumber = generated.maxNumber;

        currentPalette = palettes[Math.floor(Math.random() * palettes.length)];
        gradStart.setAttribute('stop-color', currentPalette[0]);
        gradEnd.setAttribute('stop-color', currentPalette[1]);
        
        document.documentElement.style.setProperty('--accent', currentPalette[1]);

        initBoard();
    }

    function initBoard() {
        boardEl.innerHTML = '';
        path = [];
        nextExpectedNumber = 2;
        pathLine.setAttribute('d', '');

        for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${r}-${c}`;
                
                const nodeVal = levelData[r][c];
                if (nodeVal > 0) {
                    const node = document.createElement('div');
                    node.className = 'node';
                    node.innerText = nodeVal;
                    if(nodeVal === 1) node.style.color = 'var(--accent)';
                    cell.appendChild(node);
                }
                boardEl.appendChild(cell);
            }
        }
    }

    function getCellCoords(clientX, clientY) {
        const rect = boardEl.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        
        if (x < 0 || x > rect.width || y < 0 || y > rect.height) return null;
        
        const c = Math.floor((x / rect.width) * gridSize);
        const r = Math.floor((y / rect.height) * gridSize);
        
        if (c < 0 || c >= gridSize || r < 0 || r >= gridSize) return null;
        return { r, c };
    }

    function getPathIndex(r, c) {
        return path.findIndex(p => p.r === r && p.c === c);
    }

    function truncatePathTo(index) {
        if (index < 0 || index >= path.length - 1) return;
        
        // Відрізаємо хвіст шляху
        path.splice(index + 1);

        // Перераховуємо очікувану наступну цифру
        let maxInPath = 1;
        for (let i = 0; i < path.length; i++) {
            let p = path[i];
            let val = levelData[p.r][p.c];
            if (val > maxInPath) maxInPath = val;
        }
        nextExpectedNumber = maxInPath + 1;
        
        playSound('back');
        drawSVG();
    }

    function isValidStep(r, c) {
        if (r < 0 || r >= gridSize || c < 0 || c >= gridSize) return false;
        if (getPathIndex(r, c) !== -1) return false; // Вже є в шляху
        const val = levelData[r][c];
        if (val > 0 && val !== nextExpectedNumber) return false; // Не та цифра
        return true;
    }

    function tryDrawLineTo(targetR, targetC) {
        const last = path[path.length - 1];
        if (!last) return false;

        // Нельзя вести линию дальше, если мы уже достигли последней цифры
        if (levelData[last.r][last.c] === maxNumber) return false;

        // 1. Если движение строго по горизонтали или вертикали
        if (last.r === targetR || last.c === targetC) {
            const dr = Math.sign(targetR - last.r);
            const dc = Math.sign(targetC - last.c);
            const steps = Math.max(Math.abs(targetR - last.r), Math.abs(targetC - last.c));

            let added = false;
            for (let i = 1; i <= steps; i++) {
                const r = last.r + dr * i;
                const c = last.c + dc * i;

                if (!isValidStep(r, c)) break;

                const val = levelData[r][c];
                if (val > 0) nextExpectedNumber++;
                
                path.push({ r, c });
                added = true;

                // Останавливаем линию, если только что дошли до последней цифры
                if (val === maxNumber) break;
            }

            if (added) {
                playSound('move');
                drawSVG();
                return true;
            }
            return false;
        } 
        // 2. Смарт-компенсація діагоналі: якщо палець під час швидкого свайпу трохи з'їхав убік
        else if (Math.abs(targetR - last.r) <= 2 && Math.abs(targetC - last.c) <= 2) {
            const dr = Math.sign(targetR - last.r);
            const dc = Math.sign(targetC - last.c);
            
            if (isValidStep(last.r + dr, last.c)) {
                const val = levelData[last.r + dr][last.c];
                if (val > 0) nextExpectedNumber++;
                path.push({ r: last.r + dr, c: last.c });
                playSound('move');
                drawSVG();
                tryDrawLineTo(targetR, targetC);
                return true;
            } else if (isValidStep(last.r, last.c + dc)) {
                const val = levelData[last.r][last.c + dc];
                if (val > 0) nextExpectedNumber++;
                path.push({ r: last.r, c: last.c + dc });
                playSound('move');
                drawSVG();
                tryDrawLineTo(targetR, targetC);
                return true;
            }
        }
        return false;
    }

    function handlePointer(e) {
        const coords = getCellCoords(e.clientX, e.clientY);
        if (!coords) return;

        const val = levelData[coords.r][coords.c];
        const idx = getPathIndex(coords.r, coords.c);

        if (path.length === 0) {
            if (val === 1) {
                path.push({ r: coords.r, c: coords.c });
                playSound('move');
                drawSVG();
            }
            return;
        }

        if (idx !== -1) {
            if (idx < path.length - 1) {
                truncatePathTo(idx);
            }
        } else {
            tryDrawLineTo(coords.r, coords.c);
        }
    }

    function handlePointerDown(e) {
        isPointerDown = true;
        handlePointer(e);
    }

    function handlePointerMove(e) {
        if (isPointerDown) {
            handlePointer(e);
        }
    }

    function handlePointerUp() {
        isPointerDown = false;
        checkWinCondition();
    }

    function drawSVG() {
        if (path.length === 0) {
            pathLine.setAttribute('d', '');
            return;
        }

        if (path.length === 1) {
            const x = path[0].c * 100 + 50;
            const y = path[0].r * 100 + 50;
            pathLine.setAttribute('d', `M ${x} ${y} L ${x + 0.1} ${y}`);
            return;
        }

        let d = '';
        path.forEach((p, index) => {
            const x = p.c * 100 + 50;
            const y = p.r * 100 + 50;
            if (index === 0) d += `M ${x} ${y} `;
            else d += `L ${x} ${y} `;
        });
        pathLine.setAttribute('d', d);
    }

    function resetPath() {
        initBoard();
        playSound('back');
    }

    let toastTimeout;
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.innerText = message;
        toast.classList.add('show');
        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 2000);
    }

    function checkWinCondition() {
        if (path.length > 0) {
            const lastCell = path[path.length - 1];
            if (levelData[lastCell.r][lastCell.c] === maxNumber) {
                if (path.length === totalCells) {
                    playSound('win');
                    triggerConfetti();
                    document.getElementById('winModal').classList.add('active');
                    score += 100;
                    localStorage.setItem('zipScore', score);
                    document.getElementById('scoreDisplay').innerText = score;
                } else if (path.length > 1) {
                    // Если дошли до последней цифры, но оставили пустые клетки
                    showToast("Заполните все пустые клетки!");
                }
            }
        }
    }

    let confettiAnimationId = null;

    function triggerConfetti() {
        const duration = 2500;
        const end = Date.now() + duration;
        const colors = [currentPalette[0], currentPalette[1], '#FFD166'];

        (function frame() {
            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
            if (Date.now() < end) {
                confettiAnimationId = requestAnimationFrame(frame);
            }
        }());
    }

    function nextLevel() {
        document.getElementById('winModal').classList.remove('active');
        if (confettiAnimationId) cancelAnimationFrame(confettiAnimationId);
        if (window.confetti) confetti.reset();
        
        applyNewLevel(); 
    }

    // Слухачі подій
    boardEl.addEventListener('pointerdown', handlePointerDown);
    document.addEventListener('pointermove', handlePointerMove);
    document.addEventListener('pointerup', handlePointerUp);
    boardEl.addEventListener('touchstart', (e) => e.preventDefault(), {passive: false});

    // Запуск першого рівня
    applyNewLevel();
</script>

</body>
