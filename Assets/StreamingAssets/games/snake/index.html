<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake - Brain Games</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap');

        :root {
            --bg-color: #F8F9FA;
            --text-color: #1C2331;
            --board-bg: #E9ECEF;
            --board-bg-alt: #DEE2E6; /* Для шахівниці */
            --border-color: #CED4DA; /* Колір рамки поля */
            --primary: #06D6A0;
            --food: #EF476F;
            --shadow: rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-color: #1a202c;
            --text-color: #f7fafc;
            --board-bg: #2d3748;
            --board-bg-alt: #252d3b; /* Для шахівниці */
            --border-color: #4A5568; /* Колір рамки поля */
            --primary: #05b586;
            --food: #d63d60;
            --shadow: rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none; /* Блокуємо зум на всьому документі */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .app-container {
            width: 100%;
            /* Оновили формулу, щоб вистачило місця для повноцінної хрестовини */
            max-width: min(100%, calc(100dvh - 440px));
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .theme-toggle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--board-bg);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 4px 6px var(--shadow);
            transition: transform 0.1s;
        }

        .theme-toggle:active {
            transform: scale(0.95);
        }

        .score-container {
            display: flex;
            gap: 15px;
        }

        .score-box {
            background: var(--board-bg);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 20px;
            box-shadow: 0 4px 6px var(--shadow);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-box span { color: #FFD166; }

        .title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 15px;
            text-align: center;
        }

        .board-wrapper {
            width: 100%;
            aspect-ratio: 1;
            background-color: var(--board-bg);
            border-radius: 12px;
            padding: 6px; /* Рамка */
            background: var(--border-color); /* Колір рамки */
            box-shadow: 0 10px 20px var(--shadow);
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            background-color: var(--board-bg);
            border-radius: 6px;
            display: block;
        }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: var(--bg-color);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: translateY(20px);
            transition: transform 0.3s;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal h2 { margin-bottom: 15px; font-size: 26px; }
        
        .btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.15);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.15);
        }

        /* D-Pad Джойстик для телефону */
        .controls {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(3, 65px);
            grid-template-rows: repeat(3, 65px);
            gap: 12px;
            justify-content: center;
        }

        .ctrl-btn {
            background: var(--board-bg);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            font-size: 24px;
            color: var(--text-color);
            box-shadow: 0 6px 0 var(--border-color);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .ctrl-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--border-color);
        }

        #btnUp { grid-column: 2; grid-row: 1; }
        #btnLeft { grid-column: 1; grid-row: 2; }
        #btnDown { grid-column: 2; grid-row: 3; }
        #btnRight { grid-column: 3; grid-row: 2; }

    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <button class="theme-toggle" id="themeBtn">☀️</button>
        <div class="score-container">
            <div class="score-box"><span>★</span> <div id="highScore">0</div></div>
            <div class="score-box">🍎 <div id="score">0</div></div>
        </div>
    </div>

    <h1 class="title">Змійка</h1>

    <div class="board-wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="modal" id="gameOverModal">
            <div class="modal-content">
                <h2 id="modalTitle" style="color: var(--food);">Поразка!</h2>
                <p style="margin-bottom: 5px; font-size: 18px;">Рахунок: <strong id="finalScore" style="font-size: 22px;">0</strong></p>
                <p id="newRecordBadge" style="display: none; color: var(--primary); font-size: 16px; font-weight: 800; margin-bottom: 15px;">Новий рекорд! 🏆</p>
                <button class="btn" id="restartBtn" style="margin-top: 10px;">Грати ще</button>
            </div>
        </div>
    </div>

    <!-- Візуальні кнопки управління -->
    <div class="controls">
        <button class="ctrl-btn" id="btnUp">▲</button>
        <button class="ctrl-btn" id="btnLeft">◀</button>
        <button class="ctrl-btn" id="btnDown">▼</button>
        <button class="ctrl-btn" id="btnRight">▶</button>
    </div>
</div>

<script>
    // Аудіо рушій
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'eat') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'win') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.setValueAtTime(554, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        } else if (type === 'die') {
            // Змінили тип хвилі на більш м'який, щоб не різало слух на колонках
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
            // Зменшили гучність ще сильніше (з 0.15 до 0.05)
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    // Тема
    const themeBtn = document.getElementById('themeBtn');
    let isDark = localStorage.getItem('theme') === 'dark';
    const updateTheme = () => {
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        themeBtn.textContent = isDark ? '🌙' : '☀️';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    };
    updateTheme();
    themeBtn.addEventListener('click', () => { isDark = !isDark; updateTheme(); });

    // Логіка гри
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const modal = document.getElementById('gameOverModal');
    const finalScoreEl = document.getElementById('finalScore');
    
    const gridSize = 20; // Розмір клітинки
    const tileCount = canvas.width / gridSize; // 20x20 сітка
    
    let snake, food, dx, dy, score, gameLoop, isGameOver;
    let changingDirection = false; // Захист від подвійного кліку (самогубства)
    let highScore = Number(localStorage.getItem('snakeHighScore')) || 0;
    highScoreEl.textContent = highScore;

    function initGame() {
        // Початкова позиція (3 сегменти)
        snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
        dx = 0; dy = -1; // Рух вгору
        score = 0;
        scoreEl.textContent = score;
        isGameOver = false;
        changingDirection = false;
        modal.classList.remove('active');
        placeFood();
        if (gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(update, 150); // Швидкість гри (150мс на крок)
    }

    function placeFood() {
        food = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
        };
        // Перевірка, щоб їжа не з'явилася на самій змійці
        if (snake.some(segment => segment.x === food.x && segment.y === food.y)) {
            placeFood();
        }
    }

    function update() {
        if (isGameOver) return;

        changingDirection = false; // Дозволяємо новий хід у поточному кадрі
        const head = { x: snake[0].x + dx, y: snake[0].y + dy };

        // Зіткнення зі стінами (чіткі межі)
        if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return gameOver();
        // Зіткнення з собою
        if (snake.some(segment => segment.x === head.x && segment.y === head.y)) return gameOver();

        snake.unshift(head);

        // Поїдання яблука
        if (head.x === food.x && head.y === food.y) {
            score++;
            scoreEl.textContent = score;
            playSound('eat');
            placeFood();
        } else {
            snake.pop();
        }

        draw();
    }

    function draw() {
        // Отримуємо кольори для шахівниці
        const color1 = getComputedStyle(document.documentElement).getPropertyValue('--board-bg').trim();
        const color2 = getComputedStyle(document.documentElement).getPropertyValue('--board-bg-alt').trim();

        // Малювання ідеальної шахівниці
        for (let row = 0; row < tileCount; row++) {
            for (let col = 0; col < tileCount; col++) {
                ctx.fillStyle = (row + col) % 2 === 0 ? color1 : color2;
                ctx.fillRect(col * gridSize, row * gridSize, gridSize, gridSize);
            }
        }

        // Малювання їжі
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--food').trim();
        ctx.beginPath();
        ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
        ctx.fill();

        // Малювання змійки
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
        snake.forEach((segment, index) => {
            // Легкий відступ (1px) для красивих сегментів
            ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
        });
    }

    function gameOver() {
        isGameOver = true;
        clearInterval(gameLoop);
        playSound('die');
        finalScoreEl.textContent = score;
        
        const recordBadge = document.getElementById('newRecordBadge');
        if (score > highScore && score > 0) {
            highScore = score;
            localStorage.setItem('snakeHighScore', highScore);
            highScoreEl.textContent = highScore;
            recordBadge.style.display = 'block'; // Акуратно показуємо бейдж рекорду
        } else {
            recordBadge.style.display = 'none';
        }
        
        modal.classList.add('active');
    }

    // УПРАВЛІННЯ (Логіка зміни напрямку)
    function changeDirection(newDx, newDy) {
        if (isGameOver || changingDirection) return;
        
        // Запобігання розвороту на 180 градусів
        const goingUp = dy === -1;
        const goingDown = dy === 1;
        const goingRight = dx === 1;
        const goingLeft = dx === -1;

        if (newDx === 1 && !goingLeft) { dx = 1; dy = 0; changingDirection = true; }
        if (newDx === -1 && !goingRight) { dx = -1; dy = 0; changingDirection = true; }
        if (newDy === -1 && !goingDown) { dx = 0; dy = -1; changingDirection = true; }
        if (newDy === 1 && !goingUp) { dx = 0; dy = 1; changingDirection = true; }
    }

    // Прив'язка екранних кнопок (pointerdown реагує миттєво і на тач, і на мишку)
    const bindBtn = (id, newDx, newDy) => {
        document.getElementById(id).addEventListener('pointerdown', (e) => {
            e.preventDefault(); // Блокуємо скрол
            changeDirection(newDx, newDy);
        });
    };
    bindBtn('btnUp', 0, -1);
    bindBtn('btnDown', 0, 1);
    bindBtn('btnLeft', -1, 0);
    bindBtn('btnRight', 1, 0);

    // Управління клавіатурою (для ПК)
    window.addEventListener('keydown', e => {
        if(isGameOver) return;
        switch (e.key) {
            case 'ArrowUp': changeDirection(0, -1); break;
            case 'ArrowDown': changeDirection(0, 1); break;
            case 'ArrowLeft': changeDirection(-1, 0); break;
            case 'ArrowRight': changeDirection(1, 0); break;
        }
    });

    // Рестарт
    document.getElementById('restartBtn').addEventListener('click', initGame);

    // Перший запуск
    initGame();
</script>
</body>
</html>
